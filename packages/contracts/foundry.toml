[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
mainnet = "${ETHEREUM_MAINNET_RPC_URL}"
tenderly = "${TENDERLY_FORK_RPC_URL}"
